<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback - James Hair Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

<style>
.container{
    width:90%;
    margin:auto;
    padding:40px 0;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    background:#009688;
    color:#fff;
    padding:10px;
    border:none;
    width:100%;
}
</style>
</head>

<body>

<!-- NAV -->
<div id="sideNav">
<nav>
<ul>
<li><a href="index.html#banner">HOME</a></li>
<li><a href="about.html">ABOUT</a></li>
<li><a href="findout.html">FIND OUT</a></li>
<li><a href="careers.html">CAREERS</a></li>
<li><a href="booking.html">BOOKING</a></li>
<li><a href="feedback.html">FEEDBACK</a></li>
<li><a href="index.html#footer">CONTACT</a></li>
</ul>
</nav>
</div>

<div id="menuBtn">
<img src="images/menu.png" id="menu">
</div>

<div class="container">
<h1>Questions & Feedback</h1>

<input type="text" id="name" placeholder="Your Name">
<textarea id="message" placeholder="Type your question or feedback..."></textarea>

<button onclick="sendFeedback()">Send via WhatsApp</button>
</div>

<!-- FLOATING WHATSAPP -->
<a href="https://wa.me/256773744027" class="whatsapp-float" target="_blank">
<i class="fa fa-whatsapp"></i>
</a>

<script>
function sendFeedback(){
    var name = document.getElementById("name").value;
    var message = document.getElementById("message").value;

    var url = "https://wa.me/256773744027?text="
        + "Name: " + name + "%0a"
        + "Feedback: " + message;

    window.open(url, "_blank");
}
</script>

<script>
var menuBtn = document.getElementById("menuBtn") 
var sideNav = document.getElementById("sideNav") 
var menu = document.getElementById("menu")

sideNav.style.right = "-250px";

menuBtn.onclick = function () {
    if (sideNav.style.right == "-250px") {
        sideNav.style.right = "0"
        menu.src = "images/close.png"
    } else {
        sideNav.style.right = "-250px"
        menu.src = "images/menu.png"
    }
}
</script>

</body>
</html>
